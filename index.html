<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoVallas Wrapper - Marcador Remoto</title>
    <style>
        /* Reset estricto para evitar márgenes o barras de scroll en el reproductor */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Fondo negro por si tarda en cargar la red */
            overflow: hidden; 
        }

        /* Configuración del iframe para que actúe como vista nativa */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            pointer-events: none; /* Bloquea cualquier interacción (ideal para vallas publicitarias) */
        }
    </style>
</head>
<body>

    <!-- Carga tu URL de GitHub Pages -->
    <iframe 
        id="marcador-frame"
        src="https://gpovallasmonitoreo.github.io/broadsing_marcador/" 
        frameborder="0" 
        scrolling="no">
    </iframe>

    <script>
        // MECANISMO DE SEGURIDAD (Opcional pero recomendado para DOOH)
        // Las pantallas de cartelería a veces pierden la conexión temporalmente.
        // Este script fuerza una recarga de todo el marco cada hora para asegurar 
        // que la caché se limpie y el reproductor no se quede colgado.
        
        const REFRESH_INTERVAL_MS = 3600000; // 1 hora
        
        setTimeout(() => {
            window.location.reload(true);
        }, REFRESH_INTERVAL_MS);
    </script>

</body>
</html>
